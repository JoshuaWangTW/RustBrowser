name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Lint & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Lean CLI feature check
        run: cargo check --no-default-features --features cli --bin rustbrowser

      - name: MCP feature check
        run: cargo check --no-default-features --features mcp --bin rustbrowser-mcp

      - name: Bare lib feature check
        run: cargo check --no-default-features --lib

      - name: Test
        run: cargo test --verbose

      - name: Release build
        run: cargo build --release --verbose

      - name: Binary size budget
        shell: bash
        run: |
          check_size() {
            local path="$1"
            local max_bytes="$2"
            local actual
            actual=$(stat -c%s "$path")
            echo "$path: $actual bytes (budget: $max_bytes)"
            if [ "$actual" -gt "$max_bytes" ]; then
              echo "::error::$path exceeds size budget"
              exit 1
            fi
          }
          check_size target/release/rustbrowser $((10 * 1024 * 1024))
          check_size target/release/rustbrowser-mcp $((15 * 1024 * 1024))

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # reqwest -> rustls -> ring needs NASM to assemble on Windows.
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
