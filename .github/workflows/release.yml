name: Release

# Push a tag like v0.5.0 to build cross-platform binaries and attach them to a
# GitHub Release automatically.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # reqwest -> rustls -> ring needs NASM to assemble on Windows.
      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp "target/release/rustbrowser${{ matrix.ext }}" dist/
          cp "target/release/rustbrowser-mcp${{ matrix.ext }}" dist/
          cp README.md LICENSE dist/
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../rustbrowser-${{ matrix.target }}.zip" *
          else
            tar czf "../rustbrowser-${{ matrix.target }}.tar.gz" *
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: rustbrowser-${{ matrix.target }}.*
          generate_release_notes: true
