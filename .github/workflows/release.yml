name: Release

# Push a tag like v0.5.0 to build cross-platform binaries and attach them to a
# GitHub Release automatically. Can also be dispatched manually with an existing
# tag to (re)build and backfill that release's assets — e.g. after a flaky
# upload left a platform missing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and upload assets for"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
          # Both macOS targets build on Apple Silicon (macos-latest); the x86_64
          # one is cross-compiled. This avoids the deprecated/scarce macos-13
          # Intel runner, whose queue could stall a release indefinitely.
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          # On manual dispatch, build the requested tag, not the default branch.
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # reqwest -> rustls -> ring needs NASM to assemble on Windows.
      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/rustbrowser${{ matrix.ext }}" dist/
          cp "target/${{ matrix.target }}/release/rustbrowser-mcp${{ matrix.ext }}" dist/
          cp README.md LICENSE dist/
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../rustbrowser-${{ matrix.target }}.zip" *
          else
            tar czf "../rustbrowser-${{ matrix.target }}.tar.gz" *
          fi

      - name: Checksum
        shell: bash
        run: |
          f="rustbrowser-${{ matrix.target }}.${{ matrix.archive }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$f" > "$f.sha256"
          else
            shasum -a 256 "$f" > "$f.sha256"
          fi
          cat "$f.sha256"

      # Upload via the preinstalled gh CLI with retries. The previous
      # action-gh-release attach step flaked on transient GitHub API 401s
      # (v1.3.0 needed manual reruns); `gh release upload --clobber` is
      # idempotent, so retrying is always safe.
      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Ensure the release exists; one job wins the create, the rest reuse it.
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --generate-notes \
            || true
          for i in 1 2 3; do
            if gh release upload "$TAG" rustbrowser-${{ matrix.target }}.* --clobber; then
              exit 0
            fi
            echo "upload attempt $i failed; retrying in $((i * 20))s"
            sleep $((i * 20))
          done
          exit 1
